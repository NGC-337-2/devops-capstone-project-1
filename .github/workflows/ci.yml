name: Customer Accounts Service CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1  # Reduced parallelism to prevent timeouts
      matrix:
        python-version: ['3.9']  # Single Python version to reduce build time
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask-talisman flask-cors
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Test with nosetests (Red-Green Cycle Check)
      run: |
        echo "=== Running Tests ==="
        nosetests --with-coverage --cover-package=service --cover-min-percentage=95 --verbose
    
    - name: Verify Coverage > 95%
      run: |
        nosetests --with-coverage --cover-package=service 2>&1 | grep -E "TOTAL|OK|FAILED"