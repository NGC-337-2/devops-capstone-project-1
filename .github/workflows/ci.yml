name: Customer Accounts Service CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1  # Reduced parallelism to prevent timeouts
      matrix:
        python-version: ['3.9']  # Single Python version to reduce build time
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask-talisman flask-cors
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Test with nose2 (Red-Green Cycle Check)
      run: |
        echo "=== Running Tests ==="
        nose2 -v --with-coverage --cover-package=service
    
    - name: Verify Coverage > 95%
      run: coverage report --fail-under=95 --include="service/*" --show-missing
